name: CI and Deploy

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test (with coverage)
      run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

    - name: Upload test results and coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./TestResults

    - name: Upload coverage XML artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: |
          ./TestResults/**/coverage.cobertura.xml

    - name: Install reportgenerator
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.1.8
        export PATH="$PATH:$HOME/.dotnet/tools"

    - name: Generate HTML coverage report
      run: |
        mkdir -p coverage-report
        REPORTS=$(ls ./TestResults/**/coverage.cobertura.xml 2>/dev/null || true)
        if [ -z "$REPORTS" ]; then
          echo "No coverage report found"
        else
          reportgenerator -reports:"./TestResults/**/coverage.cobertura.xml" -targetdir:coverage-report -reporttypes:Html
        fi

    - name: Upload coverage HTML artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage-report

    - name: Publish site
      run: dotnet publish VgcCollege/VgcCollege.csproj -c Release -o ./publish

    - name: Upload published artifact
      uses: actions/upload-artifact@v4
      with:
        name: vgccollege-publish
        path: ./publish

    - name: Optional rsync deploy (runs only when secrets are set)
      run: |
        if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_TARGET_PATH }}" ]; then
          echo "SSH deploy secrets not set; skipping deploy"
          exit 0
        fi
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/deploy_key
        ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
        rsync -avz --delete ./publish/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET_PATH }}"

    - name: Deployment notice
      run: |
        echo "Publish artifact uploaded. To enable automatic deploy, set the following repository secrets: SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_TARGET_PATH"
